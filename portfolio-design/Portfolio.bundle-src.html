<style>
  :root {
    --bg: #f5f3ee;
    --bg-elev: #efece5;
    --ink: #14130f;
    --ink-soft: #56544c;
    --ink-mute: #8a877d;
    --line: rgba(20,19,15,0.10);
    --line-strong: rgba(20,19,15,0.20);
    --accent-1: oklch(0.72 0.15 60);    /* amber */
    --accent-2: oklch(0.50 0.13 255);   /* indigo */
    --font-sans: "Geist", system-ui, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, monospace;
    --font-display: "Instrument Serif", "Geist", serif;
  }
  [data-theme="dark"] {
    --bg: #0e0d0b;
    --bg-elev: #16140f;
    --ink: #f3f0e8;
    --ink-soft: #b6b2a6;
    --ink-mute: #76736a;
    --line: rgba(243,240,232,0.10);
    --line-strong: rgba(243,240,232,0.22);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    font-feature-settings: "ss01", "cv11";
    transition: background 0.4s ease, color 0.4s ease;
  }
  ::selection { background: var(--accent-1); color: var(--bg); }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  /* ambient noise/grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.035;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  [data-theme="dark"] body::before { mix-blend-mode: screen; opacity: 0.06; }
</style>
</head>

  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="src/sections.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
